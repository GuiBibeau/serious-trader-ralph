name: Strategy Lab Readiness

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Run readiness evaluation, onboarding canary, or subject-control update
        required: true
        default: readiness
      request_file:
        description: Repo-relative path to a checked-in strategy-lab readiness request JSON
        required: true
      issue_number:
        description: Optional GitHub issue number to comment with the readiness summary
        required: false

permissions:
  contents: read
  issues: write

jobs:
  readiness:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"

      - name: Install deps
        run: bun install

      - name: Check admin credentials
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${ADMIN_TOKEN:-}" ]; then
            echo "::error::Missing required secret ADMIN_TOKEN for strategy-lab readiness."
            exit 1
          fi

      - name: Run strategy-lab readiness operation
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          OPERATION: ${{ inputs.operation }}
          REQUEST_FILE: ${{ inputs.request_file }}
        run: |
          set -euo pipefail
          mkdir -p .tmp/strategy-lab-readiness

          bun run strategy-lab:readiness \
            --base-url https://api.trader-ralph.com \
            --admin-token "${ADMIN_TOKEN}" \
            --output-dir .tmp/strategy-lab-readiness \
            --operation "${OPERATION}" \
            --request-file "${REQUEST_FILE}"

          markdown_file=".tmp/strategy-lab-readiness/${OPERATION}.md"
          if [ -f "${markdown_file}" ]; then
            cat "${markdown_file}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload readiness artifact
        uses: actions/upload-artifact@v4
        with:
          name: strategy-lab-readiness-${{ github.run_id }}
          path: .tmp/strategy-lab-readiness
          if-no-files-found: error

      - name: Comment on issue
        if: ${{ inputs.issue_number != '' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
          OPERATION: ${{ inputs.operation }}
        run: |
          set -euo pipefail

          run_url="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"
          body="$(cat <<EOF
          Strategy-lab readiness workflow completed.

          - operation: \`${OPERATION}\`
          - workflow run: ${run_url}
          EOF
          )"

          if [ -f ".tmp/strategy-lab-readiness/readiness.json" ]; then
            readiness_id="$(jq -r '.readiness.readinessId' .tmp/strategy-lab-readiness/readiness.json)"
            subject="$(jq -r '.readiness.subjectKind + ":" + .readiness.subjectKey' .tmp/strategy-lab-readiness/readiness.json)"
            status="$(jq -r '.readiness.status' .tmp/strategy-lab-readiness/readiness.json)"
            body="${body}

          - readinessId: \`${readiness_id}\`
          - subject: \`${subject}\`
          - status: \`${status}\`"
          fi

          if [ -f ".tmp/strategy-lab-readiness/canary.json" ]; then
            run_id="$(jq -r '.run.runId' .tmp/strategy-lab-readiness/canary.json)"
            status="$(jq -r '.status' .tmp/strategy-lab-readiness/canary.json)"
            body="${body}

          - canaryRunId: \`${run_id}\`
          - canaryStatus: \`${status}\`"
          fi

          if [ -f ".tmp/strategy-lab-readiness/control.json" ]; then
            subject="$(jq -r '.control.subjectKind + ":" + .control.subjectKey' .tmp/strategy-lab-readiness/control.json)"
            body="${body}

          - control: \`${subject}\`"
          fi

          payload="$(jq -n --arg body "$body" '{body:$body}')"
          curl -fsS \
            -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}/comments" \
            -d "${payload}" >/dev/null
