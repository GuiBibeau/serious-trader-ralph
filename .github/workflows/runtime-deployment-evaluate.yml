name: Runtime Deployment Evaluate

on:
  workflow_dispatch:
    inputs:
      deployment_id:
        description: Runtime deployment id to evaluate
        required: true
      body_file:
        description: Optional repo-relative path to a JSON request body
        required: false
      issue_number:
        description: Optional GitHub issue number to comment with the evaluation summary
        required: false

permissions:
  contents: read
  issues: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"

      - name: Install deps
        run: bun install

      - name: Check admin credentials
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${ADMIN_TOKEN:-}" ]; then
            echo "::error::Missing required secret ADMIN_TOKEN for runtime deployment evaluation."
            exit 1
          fi

      - name: Evaluate runtime deployment
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          DEPLOYMENT_ID: ${{ inputs.deployment_id }}
          BODY_FILE: ${{ inputs.body_file }}
        run: |
          set -euo pipefail
          mkdir -p .tmp/runtime-deployment-evaluate

          args=(
            --base-url https://api.trader-ralph.com
            --admin-token "${ADMIN_TOKEN}"
            --output-dir .tmp/runtime-deployment-evaluate
            --deployment-id "${DEPLOYMENT_ID}"
          )
          if [ -n "${BODY_FILE:-}" ]; then
            args+=(--body-file "${BODY_FILE}")
          fi

          bun run runtime:deployment:evaluate "${args[@]}"

          jq . .tmp/runtime-deployment-evaluate/evaluation.json >> "$GITHUB_STEP_SUMMARY"

      - name: Upload evaluation artifact
        uses: actions/upload-artifact@v4
        with:
          name: runtime-deployment-evaluate-${{ github.run_id }}
          path: .tmp/runtime-deployment-evaluate
          if-no-files-found: error

      - name: Comment on issue
        if: ${{ inputs.issue_number != '' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
          DEPLOYMENT_ID: ${{ inputs.deployment_id }}
        run: |
          set -euo pipefail

          run_state="$(jq -r '.run.state // "unknown"' .tmp/runtime-deployment-evaluate/evaluation.json)"
          execution_plan_id="$(jq -r '.executionPlan.planId // "n/a"' .tmp/runtime-deployment-evaluate/evaluation.json)"
          reconciliation_status="$(jq -r '.reconciliation.status // "n/a"' .tmp/runtime-deployment-evaluate/evaluation.json)"
          run_url="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"

          body="$(cat <<EOF
          Runtime deployment evaluation completed.

          - deploymentId: \`${DEPLOYMENT_ID}\`
          - runState: \`${run_state}\`
          - executionPlan: \`${execution_plan_id}\`
          - reconciliation: \`${reconciliation_status}\`
          - workflow run: ${run_url}
          EOF
          )"

          payload="$(jq -n --arg body "$body" '{body:$body}')"
          curl -fsS \
            -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}/comments" \
            -d "${payload}" >/dev/null
