name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - run: bun install --frozen-lockfile

      - name: Biome lint
        run: bun run lint

      - name: Bun tests
        run: bun run test

      - name: Build
        run: bun run build
