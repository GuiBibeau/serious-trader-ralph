name: CI

on:
  push:
    branches: [dev, staging, main]
  pull_request:
    branches: [dev, staging, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.0'
      - name: Install deps
        run: bun install
      - name: Run lint
        run: bun run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.0'
      - name: Install deps
        run: bun install
      - name: Run typecheck
        run: bun run typecheck

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.0'
      - name: Install deps
        run: bun install
      - name: Run unit tests
        run: bun run test:unit
      - name: Upload execution benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-benchmarks-${{ github.run_id }}
          path: .tmp/execution-benchmarks/*.json
          if-no-files-found: error

  browser-proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.0'
      - name: Install deps
        run: bun install
      - name: Run browser proof
        run: bun run harness:proof --output-dir .tmp/browser-proof
      - name: Upload browser proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-proof-${{ github.run_id }}
          path: .tmp/browser-proof
          if-no-files-found: error
      - name: Append browser proof summary
        if: always()
        run: |
          if [ -f .tmp/browser-proof/summary.md ]; then
            cat .tmp/browser-proof/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.0'
      - name: Install deps
        run: bun install
      - name: Check integration test credentials
        env:
          RPC_ENDPOINT: ${{ secrets.RPC_ENDPOINT }}
          JUPITER_API_KEY: ${{ secrets.JUPITER_API_KEY }}
        run: |
          set -euo pipefail
          for secret_name in RPC_ENDPOINT JUPITER_API_KEY; do
            if [ -z "${!secret_name:-}" ]; then
              echo "::error::Missing required secret ${secret_name} for integration-tests."
              exit 1
            fi
          done
      - name: Run integration tests
        env:
          RUN_INTEGRATION_TESTS: '1'
          RPC_ENDPOINT: ${{ secrets.RPC_ENDPOINT }}
          JUPITER_API_KEY: ${{ secrets.JUPITER_API_KEY }}
          WALLET_PRIVATE_KEY: ${{ secrets.WALLET_PRIVATE_KEY }}
          WALLET_KEYFILE: ${{ secrets.WALLET_KEYFILE }}
          JUPITER_BASE_URL: ${{ secrets.JUPITER_BASE_URL }}
        run: bun run test:integration

  terminal-e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.0'
      - name: Install deps
        run: bun install
      - name: Run terminal execution E2E suite
        run: bun run test:e2e

  artifact-publication:
    if: always()
    needs:
      - unit-tests
      - browser-proof
    runs-on: ubuntu-latest
    concurrency:
      group: proof-bundle-${{ github.event.pull_request.number || github.run_id }}
      cancel-in-progress: false
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Ensure required artifact jobs succeeded
        run: |
          set -euo pipefail
          if [ "${{ needs['unit-tests'].result }}" != "success" ]; then
            echo "::error::unit-tests must succeed before publishing artifacts."
            exit 1
          fi
          if [ "${{ needs['browser-proof'].result }}" != "success" ]; then
            echo "::error::browser-proof must succeed before publishing artifacts."
            exit 1
          fi

      - name: Download execution benchmark artifacts
        uses: actions/download-artifact@v4
        with:
          name: execution-benchmarks-${{ github.run_id }}
          path: .tmp/artifacts/execution-benchmarks

      - name: Download browser proof artifacts
        uses: actions/download-artifact@v4
        with:
          name: browser-proof-${{ github.run_id }}
          path: .tmp/artifacts/browser-proof

      - name: Build artifact summary
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          mkdir -p .tmp/artifacts/ci-summary
          benchmark_file="$(find .tmp/artifacts/execution-benchmarks -maxdepth 1 -type f -name '*.json' | head -n 1)"
          proof_summary=".tmp/artifacts/browser-proof/summary.json"

          if [ -z "${benchmark_file}" ] || [ ! -f "${benchmark_file}" ]; then
            echo "::error::Missing execution benchmark artifact."
            exit 1
          fi
          if [ ! -f "${proof_summary}" ]; then
            echo "::error::Missing browser proof summary artifact."
            exit 1
          fi

          success_rate="$(jq -r '.successRate' "${benchmark_file}")"
          success_floor="$(jq -r '.targets.successRateFloor // 0.99' "${benchmark_file}")"
          p95_ms="$(jq -r '.p95Ms' "${benchmark_file}")"
          p95_ceiling="$(jq -r '.targets.p95MsCeiling // 1500' "${benchmark_file}")"
          success_delta="$(awk "BEGIN { printf \"%+.4f\", ${success_rate} - ${success_floor} }")"
          p95_delta="$(awk "BEGIN { printf \"%+.0f\", ${p95_ceiling} - ${p95_ms} }")"

          proof_status="$(jq -r '.status' "${proof_summary}")"
          proof_expected="$(jq -r '.stats.expected' "${proof_summary}")"
          proof_unexpected="$(jq -r '.stats.unexpected' "${proof_summary}")"
          proof_screenshots="$(jq -r '.screenshots | length' "${proof_summary}")"

          cat > .tmp/artifacts/ci-summary/summary.md <<EOF
          # CI Artifact Summary

          - Workflow run: ${RUN_URL}
          - Browser proof artifact: \`browser-proof-${{ github.run_id }}\`
          - Browser proof status: ${proof_status} (${proof_expected} expected, ${proof_unexpected} unexpected, ${proof_screenshots} screenshots)
          - Benchmark artifact: \`execution-benchmarks-${{ github.run_id }}\`
          - Benchmark delta vs target:
            successRate ${success_rate} (${success_delta} vs floor ${success_floor})
            p95Ms ${p95_ms} (${p95_delta} ms vs ceiling ${p95_ceiling})
          EOF

          cat > .tmp/artifacts/ci-summary/pr-comment.md <<EOF
          <!-- ci-artifacts -->
          ## CI Artifacts
          - Workflow run: ${RUN_URL}
          - Browser proof bundle: \`browser-proof-${{ github.run_id }}\`
          - Benchmark bundle: \`execution-benchmarks-${{ github.run_id }}\`
          - Browser proof: ${proof_status} with ${proof_expected} expected / ${proof_unexpected} unexpected and ${proof_screenshots} screenshots
          - Benchmark delta: successRate ${success_rate} (${success_delta} vs ${success_floor} floor); p95Ms ${p95_ms} (${p95_delta} ms vs ${p95_ceiling} ceiling)
          EOF

          cat > .tmp/artifacts/ci-summary/handoff.json <<EOF
          {
            "workflowRunUrl": "${RUN_URL}",
            "browserProofBundle": "browser-proof-${{ github.run_id }}",
            "benchmarkBundle": "execution-benchmarks-${{ github.run_id }}",
            "browserProofLine": "passed with ${proof_expected} expected / ${proof_unexpected} unexpected and ${proof_screenshots} screenshots",
            "benchmarkDeltaLine": "successRate ${success_rate} (${success_delta} vs ${success_floor} floor); p95Ms ${p95_ms} (${p95_delta} ms vs ${p95_ceiling} ceiling)"
          }
          EOF

          cat .tmp/artifacts/ci-summary/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload CI summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-summary-${{ github.run_id }}
          path: .tmp/artifacts/ci-summary
          if-no-files-found: error

      - name: Post PR artifact summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- harness-proof-bundle -->";
            const sectionMarkers = {
              summary: ["<!-- proof:summary:start -->", "<!-- proof:summary:end -->"],
              preview: ["<!-- proof:preview:start -->", "<!-- proof:preview:end -->"],
              checks: ["<!-- proof:checks:start -->", "<!-- proof:checks:end -->"],
              artifacts: ["<!-- proof:artifacts:start -->", "<!-- proof:artifacts:end -->"],
              canary: ["<!-- proof:canary:start -->", "<!-- proof:canary:end -->"],
              risk: ["<!-- proof:risk:start -->", "<!-- proof:risk:end -->"],
            };
            const requiredChecks = [
              "lint",
              "typecheck",
              "unit-tests",
              "integration-tests",
              "terminal-e2e-tests",
              "browser-proof",
              "preview-smoke",
              "artifact-publication",
            ];
            const handoff = JSON.parse(
              fs.readFileSync(".tmp/artifacts/ci-summary/handoff.json", "utf8"),
            );

            function escapeRegExp(value) {
              return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            }

            function buildSection(title, name, lines) {
              const [start, end] = sectionMarkers[name];
              return [
                `### ${title}`,
                start,
                ...lines,
                end,
                "",
              ];
            }

            function buildDefaultBody(existingBody) {
              const fallbackPr = `#${context.issue.number}`;
              const fallbackBranch = `\`${context.payload.pull_request.head.ref}\``;
              return [
                marker,
                "## Harness Proof Bundle",
                "",
                ...buildSection("Summary", "summary", [
                  `- PR: ${fallbackPr}`,
                  `- Branch: ${fallbackBranch}`,
                  "- Change summary: pending runner-authored detail or reviewer notes.",
                ]),
                ...buildSection("Preview", "preview", [
                  "<!-- pr-preview -->",
                  "- Portal: pending",
                  "- Worker: pending",
                  "- Worker name: pending",
                  "- Preview metadata artifact: pending",
                ]),
                ...buildSection(
                  "Required Checks",
                  "checks",
                  requiredChecks.map((check) => `- ${check}: pending`),
                ),
                ...buildSection("Artifacts", "artifacts", [
                  "- Workflow run: pending",
                  "- Browser proof bundle: pending",
                  "- Benchmark bundle: pending",
                  "- Browser proof: pending",
                  "- Benchmark delta: pending",
                ]),
                ...buildSection("Canary Status", "canary", [
                  "- Status: production canary unchanged until this change reaches `main`.",
                ]),
                ...buildSection("Risk Notes", "risk", [
                  "- Human review is still required; this handoff stops at `human-review`.",
                  "- Issue-specific risk notes are pending and should be updated before merge if the change introduces rollout or contract risk.",
                ]),
                "",
                "This comment is the single repo-owned handoff summary for runner-created PRs.",
              ].join("\n");
            }

            function replaceSection(body, name, lines) {
              const [start, end] = sectionMarkers[name];
              const replacement = [start, ...lines, end].join("\n");
              return body.replace(
                new RegExp(`${escapeRegExp(start)}[\\s\\S]*?${escapeRegExp(end)}`),
                replacement,
              );
            }

            function normalizeCheckStatus(rollup, checkName) {
              if (checkName === "artifact-publication") {
                return "success";
              }
              const match = rollup.find((item) => item.name === checkName);
              if (!match) return "pending";
              if (match.__typename === "StatusContext") {
                return String(match.state ?? "pending").toLowerCase();
              }
              if (String(match.status ?? "pending").toLowerCase() !== "completed") {
                return "pending";
              }
              return String(match.conclusion ?? "pending").toLowerCase();
            }

            const [checkRunsResponse, combinedStatusResponse] = await Promise.all([
              github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: context.payload.pull_request.head.sha,
                per_page: 100,
              }),
              github.rest.repos.getCombinedStatusForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: context.payload.pull_request.head.sha,
              }),
            ]);
            const rollup = [
              ...checkRunsResponse.data.check_runs.map((checkRun) => ({
                __typename: "CheckRun",
                name: checkRun.name,
                status: checkRun.status,
                conclusion: checkRun.conclusion,
              })),
              ...combinedStatusResponse.data.statuses.map((statusContext) => ({
                __typename: "StatusContext",
                name: statusContext.context,
                state: statusContext.state,
              })),
            ];

            const checksLines = requiredChecks.map(
              (check) => `- ${check}: ${normalizeCheckStatus(rollup, check)}`,
            );
            const artifactLines = [
              `- Workflow run: ${handoff.workflowRunUrl}`,
              `- Browser proof bundle: \`${handoff.browserProofBundle}\``,
              `- Benchmark bundle: \`${handoff.benchmarkBundle}\``,
              `- Browser proof: ${handoff.browserProofLine}`,
              `- Benchmark delta: ${handoff.benchmarkDeltaLine}`,
            ];
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker),
            );
            const body = replaceSection(
              replaceSection(
                existing?.body ?? buildDefaultBody(existing?.body ?? null),
                "checks",
                checksLines,
              ),
              "artifacts",
              artifactLines,
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
