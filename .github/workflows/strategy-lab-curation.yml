name: Strategy Lab Curation

on:
  workflow_dispatch:
    inputs:
      request_file:
        description: Repo-relative path to a checked-in strategy-lab curation request JSON
        required: true
      issue_number:
        description: Optional GitHub issue number to comment with the curation summary
        required: false

permissions:
  contents: read
  issues: write

jobs:
  curate:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"

      - name: Install deps
        run: bun install

      - name: Check admin credentials
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${ADMIN_TOKEN:-}" ]; then
            echo "::error::Missing required secret ADMIN_TOKEN for strategy-lab curation."
            exit 1
          fi

      - name: Run strategy-lab curation
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          REQUEST_FILE: ${{ inputs.request_file }}
        run: |
          set -euo pipefail
          mkdir -p .tmp/strategy-lab-curation

          bun run strategy-lab:curate \
            --base-url https://api.trader-ralph.com \
            --admin-token "${ADMIN_TOKEN}" \
            --output-dir .tmp/strategy-lab-curation \
            --request-file "${REQUEST_FILE}"

          cat .tmp/strategy-lab-curation/curation.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload curation artifact
        uses: actions/upload-artifact@v4
        with:
          name: strategy-lab-curation-${{ github.run_id }}
          path: .tmp/strategy-lab-curation
          if-no-files-found: error

      - name: Comment on issue
        if: ${{ inputs.issue_number != '' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail

          run_url="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"
          source_count="$(jq -r '.sources.attempted' .tmp/strategy-lab-curation/curation.json)"
          asset_count="$(jq -r '.assets.attempted' .tmp/strategy-lab-curation/curation.json)"
          backtest_count="$(jq -r '.backtests.attempted' .tmp/strategy-lab-curation/curation.json)"

          body="$(cat <<EOF
          Strategy-lab curation completed.

          - sources: \`${source_count}\`
          - assets: \`${asset_count}\`
          - backtests: \`${backtest_count}\`
          - workflow run: ${run_url}
          EOF
          )"

          payload="$(jq -n --arg body "$body" '{body:$body}')"
          curl -fsS \
            -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}/comments" \
            -d "${payload}" >/dev/null
